---
- name: Install and configure Zabbix Agent2
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    zabbix_repo_version: "7.4"

  pre_tasks:
    - name: Ensure apt dependencies (Debian/Ubuntu)
      ansible.builtin.apt:
        name:
          - gnupg
          - apt-transport-https
          - ca-certificates
          - curl
        state: present
        update_cache: yes
      when: ansible_pkg_mgr == "apt"

  tasks:
    - name: Fail if zabbix_server_ip is not defined
      ansible.builtin.fail:
        msg: "zabbix_server_ip variable must be defined (via Semaphore, inventory, or -e)."
      when: zabbix_server_ip is not defined

    - name: Detect package manager
      ansible.builtin.set_fact:
        pkg_mgr: "{{ ansible_pkg_mgr }}"

    # ---------------------- RHEL / Rocky / AlmaLinux ----------------------
    - name: Add Zabbix repository (RHEL-based)
      ansible.builtin.yum_repository:
        name: zabbix
        description: "Zabbix Official Repository"
        baseurl: "https://repo.zabbix.com/zabbix/{{ zabbix_repo_version }}/release/rhel/{{ ansible_distribution_major_version }}/x86_64/"
        gpgcheck: yes
        gpgkey: "https://repo.zabbix.com/zabbix-official-repo.key"
        enabled: yes
      when: pkg_mgr in ["yum", "dnf"]

    # ---------------------- Ubuntu via .deb ----------------------
    - name: Download Zabbix release package for Ubuntu
      ansible.builtin.get_url:
        url: >-
          https://repo.zabbix.com/zabbix/{{ zabbix_repo_version }}/release/ubuntu/pool/main/z/zabbix-release/zabbix-release_latest_{{ zabbix_repo_version }}+ubuntu{{ ansible_distribution_version }}_all.deb
        dest: "/tmp/zabbix-release_latest_{{ zabbix_repo_version }}.deb"
      when: ansible_distribution == "Ubuntu"

    - name: Install Zabbix release package (Ubuntu)
      ansible.builtin.apt:
        deb: "/tmp/zabbix-release_latest_{{ zabbix_repo_version }}.deb"
      when: ansible_distribution == "Ubuntu"

    - name: Update apt cache (Ubuntu)
      ansible.builtin.apt:
        update_cache: yes
      when: ansible_distribution == "Ubuntu"

    # ---------------------- Debian standard repo ----------------------
    - name: Normalize Debian codename for repo
      ansible.builtin.set_fact:
        zabbix_repo_codename: "{{ ansible_distribution_release | lower }}"
      when: ansible_distribution == "Debian"

    - name: Download and convert Zabbix GPG key (Debian)
      ansible.builtin.shell: |
        curl -fsSL https://repo.zabbix.com/zabbix-official-repo.key | gpg --dearmor -o /usr/share/keyrings/zabbix-official.gpg
      args:
        creates: /usr/share/keyrings/zabbix-official.gpg
      when: ansible_distribution == "Debian"

    - name: Add Zabbix repository (Debian)
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/zabbix-official.gpg] https://repo.zabbix.com/zabbix/{{ zabbix_repo_version }}/release/debian {{ zabbix_repo_codename }} main"
        state: present
      when: ansible_distribution == "Debian"

    - name: Update apt cache (Debian)
      ansible.builtin.apt:
        update_cache: yes
      when: ansible_distribution == "Debian"

    # ---------------------- Install Agent ----------------------
    - name: Ensure zabbix-agent2 is installed
      ansible.builtin.package:
        name: zabbix-agent2
        state: present

    # ---------------------- Configure Agent ----------------------
    - name: Update Server in zabbix_agent2.conf
      ansible.builtin.lineinfile:
        path: /etc/zabbix/zabbix_agent2.conf
        regexp: '^Server='
        line: "Server={{ zabbix_server_ip }}"
        backup: yes

    - name: Update ServerActive in zabbix_agent2.conf
      ansible.builtin.lineinfile:
        path: /etc/zabbix/zabbix_agent2.conf
        regexp: '^ServerActive='
        line: "ServerActive={{ zabbix_server_ip }}"
        backup: yes

    # ---------------------- Enable Service ----------------------
    - name: Enable and start zabbix-agent2 service
      ansible.builtin.service:
        name: zabbix-agent2
        state: started
        enabled: yes
