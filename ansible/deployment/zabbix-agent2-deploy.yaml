---
- name: Install and configure Zabbix Agent2
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    zabbix_repo_version: "7.4"

  pre_tasks:
    - name: Ensure apt dependencies (Debian/Ubuntu)
      ansible.builtin.apt:
        name:
          - gnupg
          - apt-transport-https
          - ca-certificates
          - curl
        state: present
        update_cache: yes
      when: ansible_pkg_mgr == "apt"

  tasks:
    - name: Fail if zabbix_server_ip is not defined
      ansible.builtin.fail:
        msg: "zabbix_server_ip variable must be defined (via Semaphore, inventory, or -e)."
      when: zabbix_server_ip is not defined

    - name: Detect package manager
      ansible.builtin.set_fact:
        pkg_mgr: "{{ ansible_pkg_mgr }}"

    # ---------------------- RHEL / Rocky / AlmaLinux ----------------------
    - name: Add Zabbix repository (RHEL-based)
      ansible.builtin.yum_repository:
        name: zabbix
        description: "Zabbix Official Repository"
        baseurl: "https://repo.zabbix.com/zabbix/{{ zabbix_repo_version }}/release/rhel/{{ ansible_distribution_major_version }}/x86_64/"
        gpgcheck: yes
        gpgkey: "https://repo.zabbix.com/zabbix-official-repo.key"
        enabled: yes
      when: pkg_mgr in ["yum", "dnf"]

    # ---------------------- Debian / Ubuntu ----------------------
    - name: Normalize repo OS and codename
      ansible.builtin.set_fact:
        zabbix_repo_os: "{{ 'debian' if ansible_distribution == 'Debian' else 'ubuntu' }}"
        zabbix_repo_codename: >-
          {% if ansible_distribution == 'Ubuntu' and ansible_distribution_release in ['noble', 'plucky'] %}
            jammy
          {% else %}
            {{ ansible_distribution_release | lower }}
          {% endif %}
      when: pkg_mgr == "apt"

    - name: Download and convert Zabbix GPG key (apt)
      ansible.builtin.shell: |
        curl -fsSL https://repo.zabbix.com/zabbix-official-repo.key | gpg --dearmor -o /usr/share/keyrings/zabbix-official.gpg
      args:
        creates: /usr/share/keyrings/zabbix-official.gpg
      when: pkg_mgr == "apt"

    - name: Add Zabbix repository (Debian/Ubuntu)
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/zabbix-official.gpg] https://repo.zabbix.com/zabbix/{{ zabbix_repo_version }}/release/{{ zabbix_repo_os }} {{ zabbix_repo_codename }} main"
        state: present
      when: pkg_mgr == "apt"

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
      when: pkg_mgr == "apt"

    # ---------------------- Install Agent ----------------------
    - name: Ensure zabbix-agent2 is installed
      ansible.builtin.package:
        name: zabbix-agent2
        state: present

    # ---------------------- Configure Agent ----------------------
    - name: Update Server in zabbix_agent2.conf
      ansible.builtin.lineinfile:
        path: /etc/zabbix/zabbix_agent2.conf
        regexp: '^Server='
        line: "Server={{ zabbix_server_ip }}"
        backup: yes

    - name: Update ServerActive in zabbix_agent2.conf
      ansible.builtin.lineinfile:
        path: /etc/zabbix/zabbix_agent2.conf
        regexp: '^ServerActive='
        line: "ServerActive={{ zabbix_server_ip }}"
        backup: yes

    # ---------------------- Enable Service ----------------------
    - name: Enable and start zabbix-agent2 service
      ansible.builtin.service:
        name: zabbix-agent2
        state: started
        enabled: yes
